<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoJo - 项目导航</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-card-hover: #222222;
      --border: #2a2a2a;
      --border-hover: #3a3a3a;
      --text: #e8e8e8;
      --text-muted: #888888;
      --accent: #c9a96e;
      --accent-hover: #d4b87a;
      --shadow: rgba(0,0,0,0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 300;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 20px auto 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px var(--shadow);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
    }
    .card-icon svg {
      stroke: var(--bg);
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-meta .tag {
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(201, 169, 110, 0.1);
      color: var(--accent);
      font-weight: 500;
    }

    .card-arrow {
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover .card-arrow {
      opacity: 1;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>万豪</h1>
    <p>项目导航 · 万豪数字化</p>
    <div class="divider"></div>
  </div>

  <div class="grid">
    <a class="card" href="https://jojo-lij.github.io/marriott-mp-features/" target="_blank">
      <div class="card-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div class="card-title">万豪小程序完整功能</div>
      <div class="card-desc">万豪旅享家小程序功能说明文档，涵盖预订、会员卡、商城、服务四个小程序的完整功能清单与截图。</div>
      <div class="card-meta">
        <span class="tag">小程序</span>
        <span class="tag">功能文档</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <a class="card" href="https://jojo-lij.github.io/mb-features/" target="_blank">
      <div class="card-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>
      </div>
      <div class="card-title">APP功能说明</div>
      <div class="card-desc">万豪旅享家 China App 功能说明站点，包含模块化功能展示、竞品矩阵分析与截图关联。</div>
      <div class="card-meta">
        <span class="tag">APP</span>
        <span class="tag">竞品矩阵</span>
        <span class="card-arrow">→</span>
      </div>
    </a>
  </div>

  <div class="footer">
    <p>© 2026 JoJo · 万豪数字化项目</p>
  </div>
</body>
</html>
